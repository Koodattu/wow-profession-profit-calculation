services:
  db:
    image: postgres:16-alpine
    container_name: wowtools-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wowtools
      POSTGRES_PASSWORD: wowtools
      POSTGRES_DB: wowtools
    ports:
      - "127.0.0.1:5566:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wowtools"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
